# SkyClaw Default Configuration
# Cloud-native Rust AI agent runtime

[skyclaw]
mode = "auto"  # "cloud" | "local" | "auto"
tenant_isolation = false

[gateway]
host = "127.0.0.1"
port = 8080
tls = false

[provider]
name = "anthropic"
api_key = "${ANTHROPIC_API_KEY}"
model = "claude-sonnet-4-6"

[memory]
backend = "sqlite"
# path = "~/.skyclaw/memory.db"

[memory.search]
vector_weight = 0.7
keyword_weight = 0.3

[vault]
backend = "local-chacha20"
# key_file = "~/.skyclaw/vault.key"

[filestore]
backend = "local"
# path = "~/.skyclaw/files"

[security]
sandbox = "mandatory"
file_scanning = true
skill_signing = "required"
audit_log = true

[heartbeat]
enabled = false      # Enable autonomous heartbeat loop
interval = "30m"     # How often to check (s/m/h/d)
checklist = "HEARTBEAT.md"  # Task checklist file in workspace
# report_to = ""    # Chat ID to send heartbeat reports to
# active_hours = "08:00-22:00"  # Only fire heartbeats within this window (local time)

[cron]
storage = "sqlite"

[tools]
shell = true
browser = true
file = true
git = true
cron = true
http = true

[observability]
log_level = "info"
otel_enabled = false

